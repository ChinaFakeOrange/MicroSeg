# MicroSeg — nginx config for the frontend container.
# Serves the built SPA and proxies the API (including the task WebSocket) to
# the `api` service on the compose network.

upstream microseg_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long cache; index.html stays revalidated.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST + WebSocket -> FastAPI. The WS upgrade headers must be forwarded.
    location /api/ {
        proxy_pass http://microseg_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;     # long-lived task stream
        proxy_send_timeout 3600s;
        client_max_body_size 200m;    # allow large image uploads
    }

    # SPA history-mode fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
